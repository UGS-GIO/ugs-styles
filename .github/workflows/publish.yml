name: Publish styles to CDN

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Single origin: the shared maps-assets surface (same CDN as STAC/PMTiles/COG/viewer).
      # Served at https://maps-assets.geology.utah.gov/styles/ — the warehouse bridge's default
      # STYLES_INDEX_URL, so no warehouse config needed.
      GCP_PROJECT: ut-dnr-ugs-maps-prod
      GCS_BUCKET: ut-dnr-ugs-maps-prod-public
      GCS_PREFIX: styles
      # Warehouse rebind: after the CDN is updated, kick the cheap restyle job so STAC items'
      # `renders` re-bind to the new styles (no full reingest). Lives in the compute project.
      WAREHOUSE_PROJECT: ut-dnr-ugs-backend-tools
      WAREHOUSE_REGION: us-central1
      RESTYLE_JOB: ugs-warehouse-restyle
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build:json
      # Bake pie-wedge sprite sheets (UCRC wells by-boxtype) from the live GeoParquet → dist-json,
      # so the icon render publishes with its sprites. Must run after build:json (which wipes dist).
      - run: npm run gen:sprites
      # Gate the release on data reality: fails if a style keys on a field absent from the live
      # GeoParquet (value/case drift only warns). Catches "builds clean but draws nothing".
      - run: npm run validate

      # Workload Identity Federation. Both secrets must be set in repo settings:
      #   GCP_WIF_PROVIDER  — full resource name of the WIF provider
      #                       (projects/<num>/locations/global/workloadIdentityPools/<pool>/providers/<provider>)
      #   GCP_SERVICE_ACCOUNT — service account email with roles/storage.objectAdmin on
      #                          gs://ut-dnr-ugs-maps-prod-public (cross-project grant — the SA may
      #                          live elsewhere; it needs write on the maps-prod public bucket).
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Sync dist-json to GCS
        run: |
          gsutil -m rsync -r -d dist-json/ gs://${GCS_BUCKET}/${GCS_PREFIX}/
          gsutil -m setmeta -h "Cache-Control:public, max-age=300" \
            "gs://${GCS_BUCKET}/${GCS_PREFIX}/**/*.json"

      # Rebind STAC renders to the just-published styles. `--wait` surfaces the result in this
      # run; the job re-fetches the manifest and rewrites only the items whose renders changed
      # (seconds — no data reingest). The CDN is already updated above, so styles are live for
      # any live-manifest consumer even if this step is skipped.
      #
      # Work-box prerequisites (one-time):
      #   1. Create the job (same image as the ingest job, restyle command):
      #        gcloud run jobs create ugs-warehouse-restyle \
      #          --project ut-dnr-ugs-backend-tools --region us-central1 \
      #          --image <same image as ugs-warehouse-ingest> \
      #          --command python --args -m,ugs_warehouse.restyle
      #   2. Grant the publish SA (GCP_SERVICE_ACCOUNT) on the compute project:
      #        roles/run.developer  +  roles/iam.serviceAccountUser (on the job's runtime SA).
      - name: Rebind warehouse STAC renders
        run: |
          gcloud run jobs execute "${RESTYLE_JOB}" \
            --project "${WAREHOUSE_PROJECT}" --region "${WAREHOUSE_REGION}" --wait
