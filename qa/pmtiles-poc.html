<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>PMTiles PoC — alluvialfan_current</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css" />
    <style>
        html, body, #map { margin: 0; padding: 0; height: 100%; }
        #info {
            position: absolute; top: 8px; left: 8px; z-index: 5;
            background: #fff; padding: 6px 10px; border-radius: 4px;
            font: 12px system-ui; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div id="info">PMTiles: <code>alluvialfan_current.pmtiles</code> · style: <code>dist-json/styles/alluvialfan_current/default.json</code></div>
    <div id="map"></div>
    <script type="module">
        import maplibregl from 'https://esm.sh/maplibre-gl@5.5.0';
        import * as pmtiles from 'https://esm.sh/pmtiles@4.3.0';

        maplibregl.addProtocol('pmtiles', new pmtiles.Protocol().tile);

        const map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    basemap: {
                        type: 'raster',
                        tiles: [
                            'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                            'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                        ],
                        tileSize: 256,
                    },
                    alluvial: {
                        type: 'vector',
                        url: 'pmtiles:///dist-pmtiles/alluvialfan_current.pmtiles',
                    },
                },
                layers: [{ id: 'basemap', type: 'raster', source: 'basemap' }],
            },
            center: [-111.65, 39.6],
            zoom: 7,
        });

        map.on('load', async () => {
            const styleDoc = await fetch(`/dist-json/styles/alluvialfan_current/default.json?t=${Date.now()}`).then((r) => r.json());
            for (const layer of styleDoc.layers) {
                map.addLayer({
                    ...layer,
                    source: 'alluvial',
                    'source-layer': 'alluvialfan_current',
                });
            }
        });

        map.on('error', (e) => console.error('map error:', e.error));
    </script>
</body>
</html>
