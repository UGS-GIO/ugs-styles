<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>ugs-styles QA — old (WMS) vs new (vector)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
        #app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
        header {
            background: #1f2933; color: #f5f7fa; padding: 10px 14px;
            display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
        }
        header h1 { margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.4px; }
        header label { font-size: 12px; display: flex; gap: 6px; align-items: center; }
        header select, header input[type="range"] { font-size: 12px; }
        header select { min-width: 320px; }
        #map { width: 100%; height: 100%; }
        .swatch {
            display: inline-block; width: 10px; height: 10px; border-radius: 2px;
            vertical-align: middle; margin-right: 4px;
        }
        .swatch.old { background: #d11149; }
        .swatch.new { background: #1ec7c7; }
        .swatch.pm  { background: #f4a261; }
        #status { font-size: 11px; opacity: 0.85; }
        #loader {
            display: none; width: 12px; height: 12px; border-radius: 50%;
            border: 2px solid #f5f7fa55; border-top-color: #1ec7c7;
            animation: spin 0.7s linear infinite;
        }
        body.loading #loader { display: inline-block; }
        body.loading select, body.loading button { opacity: 0.5; pointer-events: none; }
        body.loading #map::after {
            content: ''; position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.05); pointer-events: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>UGS QA</h1>
            <label>layer
                <select id="layerSel"><option value="">— pick —</option></select>
            </label>
            <label><input type="checkbox" id="showOld" checked /><span class="swatch old"></span>WMS</label>
            <label>op <input type="range" id="oldOp" min="0" max="1" step="0.05" value="1" style="width: 70px" /></label>
            <label><input type="checkbox" id="showNew" /><span class="swatch new"></span>WFS</label>
            <label>op <input type="range" id="newOp" min="0" max="1" step="0.05" value="1" style="width: 70px" /></label>
            <label><input type="checkbox" id="showPm" checked /><span class="swatch pm"></span>PMTiles</label>
            <label>op <input type="range" id="pmOp" min="0" max="1" step="0.05" value="1" style="width: 70px" /></label>
            <label><button id="zoomFit">fit layer</button></label>
            <span id="loader" aria-hidden="true"></span>
            <span id="status">ready</span>
        </header>
        <div id="map"></div>
    </div>
    <script type="module" src="./qa.mjs"></script>
</body>
</html>
