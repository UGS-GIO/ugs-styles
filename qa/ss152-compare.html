<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>SS-152 source vs WMS — Copperton landslide susceptibility</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.5.0/dist/maplibre-gl.css" />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
        #app { display: grid; grid-template-rows: auto 1fr; height: 100vh; }
        header {
            background: #1f2933; color: #f5f7fa; padding: 8px 14px;
            display: flex; gap: 14px; align-items: center; font-size: 12px;
        }
        header strong { font-size: 13px; }
        .pane-labels {
            position: absolute; top: 50px; left: 0; right: 0; pointer-events: none;
            display: flex; justify-content: space-around; z-index: 5;
        }
        .pane-labels span {
            background: rgba(31,41,51,0.92); color: #f5f7fa;
            padding: 6px 12px; border-radius: 4px; font-size: 12px;
        }
        #maps { display: grid; grid-template-columns: 1fr 1fr; height: 100%; gap: 1px; background: #1f2933; }
        .map { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <strong>SS-152 source ↔ WMS lossless check</strong>
            <span>layer: hazards:landslidesusceptibility_current (Copperton)</span>
            <span style="margin-left:auto">synced pan/zoom · z19 default</span>
        </header>
        <div style="position: relative; height: calc(100% - 0px);">
            <div class="pane-labels">
                <span>LEFT — WMS (live GeoServer raster)</span>
                <span>RIGHT — PMTiles built from SS-152 GDB download</span>
            </div>
            <div id="maps">
                <div id="mapLeft" class="map"></div>
                <div id="mapRight" class="map"></div>
            </div>
        </div>
    </div>
    <script type="module">
        import maplibregl from 'https://esm.sh/maplibre-gl@5.5.0';
        import * as pmtiles from 'https://esm.sh/pmtiles@4.3.0';
        maplibregl.addProtocol('pmtiles', new pmtiles.Protocol().tile);

        const GEOSERVER = 'https://ugs-geoserver-prod-flbcoqv7oa-uc.a.run.app/geoserver';
        const QUALIFIED = 'hazards:landslidesusceptibility_current';
        const PMTILES_PATH = '/dist-pmtiles/ss152_source_landslide_susceptibility.pmtiles';
        const FILL_BY_HAZARD = ['match', ['get', 'LSSHazardUnit'],
            'Hlss', '#e60000',
            'Mlss', '#e69800',
            'Llss', '#98e600',
            'transparent'];

        const baseStyle = {
            version: 8,
            sources: {
                basemap: {
                    type: 'raster',
                    tiles: [
                        'https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                        'https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
                    ],
                    tileSize: 256,
                },
            },
            layers: [{ id: 'basemap', type: 'raster', source: 'basemap' }],
        };

        const center = [-112.0633, 40.5625];
        const zoom = 19;

        const left = new maplibregl.Map({ container: 'mapLeft', style: structuredClone(baseStyle), center, zoom });
        const right = new maplibregl.Map({ container: 'mapRight', style: structuredClone(baseStyle), center, zoom });

        // Sync left ↔ right
        let syncing = false;
        const sync = (a, b) => a.on('move', () => {
            if (syncing) return;
            syncing = true;
            b.jumpTo({ center: a.getCenter(), zoom: a.getZoom(), bearing: a.getBearing(), pitch: a.getPitch() });
            syncing = false;
        });
        sync(left, right);
        sync(right, left);

        // LEFT: WMS raster
        left.on('load', () => {
            const url = `${GEOSERVER}/wms?service=WMS&version=1.1.1&request=GetMap` +
                `&layers=${encodeURIComponent(QUALIFIED)}` +
                `&styles=&format=image/png&transparent=true` +
                `&srs=EPSG:3857&bbox={bbox-epsg-3857}&width=512&height=512`;
            left.addSource('wms', { type: 'raster', tiles: [url], tileSize: 512 });
            left.addLayer({ id: 'wms-layer', type: 'raster', source: 'wms', paint: { 'raster-opacity': 1 } });
        });

        // RIGHT: PMTiles built from SS-152 source data
        right.on('load', () => {
            right.addSource('ss152', {
                type: 'vector',
                url: `pmtiles://${PMTILES_PATH}?t=${Date.now()}`,
            });
            right.addLayer({
                id: 'ss152-fill',
                type: 'fill',
                source: 'ss152',
                'source-layer': 'landslide_susceptibility',
                paint: { 'fill-color': FILL_BY_HAZARD },
            });
            right.addLayer({
                id: 'ss152-outline',
                type: 'line',
                source: 'ss152',
                'source-layer': 'landslide_susceptibility',
                layout: { 'line-cap': 'round', 'line-join': 'round' },
                paint: {
                    'line-color': '#6e6e6e',
                    'line-width': ['interpolate', ['linear'], ['zoom'], 6, 0.5, 10, 1.25, 14, 2, 18, 3.5],
                },
            });
        });
    </script>
</body>
</html>
